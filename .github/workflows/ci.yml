name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # synthforge-core must never depend on Spring (spec section 4);
      # fail the build if a Spring import sneaks in.
      - name: Verify synthforge-core stays Spring-free
        run: "! grep -rE 'import\\s+org\\.springframework' synthforge-core/src/main/java"

      - name: Build and test
        run: mvn --batch-mode clean install
